<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ForenCore — Forensic Workstation</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111827;--bg2:#1f2937;--bg3:#374151;--bg4:#4b5563;
  --border:#2d3748;--border2:#374151;
  --text:#f9fafb;--text2:#9ca3af;--text3:#6b7280;
  --purple:#7c3aed;--purple2:#6d28d9;--purple3:#a78bfa;--purple4:#ede9fe;
  --blue:#3b82f6;--blue2:#1d4ed8;
  --green:#10b981;--red:#ef4444;--orange:#f59e0b;--cyan:#06b6d4;
  --sidebar:230px;--topbar:52px;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;height:100vh;overflow:hidden}
#root{display:flex;height:100vh}
/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--bg4)}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--purple),#4f46e5);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.logo-name{font-size:16px;font-weight:800;background:linear-gradient(90deg,var(--purple3),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-ver{font-size:10px;color:var(--text3);margin-top:1px}
.nav-group{padding:10px 0 4px}
.nav-section-label{padding:4px 14px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;color:var(--text2);border-left:3px solid transparent;transition:all .12s;font-size:12.5px;position:relative}
.nav-item:hover{background:rgba(124,58,237,.08);color:var(--text)}
.nav-item.active{background:rgba(124,58,237,.15);color:var(--purple3);border-left-color:var(--purple)}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--green);margin-left:auto;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sidebar-footer{margin-top:auto;padding:12px 14px;border-top:1px solid var(--border)}
.sys-bar{background:var(--bg3);border-radius:4px;height:4px;margin-top:4px;overflow:hidden}
.sys-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .5s}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:var(--topbar);background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;flex-shrink:0}
.topbar-title{font-size:15px;font-weight:700;flex:1;display:flex;align-items:center;gap:8px}
.topbar-icon{width:28px;height:28px;border-radius:6px;background:rgba(124,58,237,.2);display:flex;align-items:center;justify-content:center;font-size:14px}
.page-content{flex:1;overflow-y:auto;padding:20px}

/* ── Buttons ── */
.btn{padding:7px 14px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12px;display:inline-flex;align-items:center;gap:6px;transition:all .12s;white-space:nowrap}
.btn:hover{border-color:var(--purple3);color:var(--purple3)}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-primary{background:var(--purple2);border-color:var(--purple);color:#fff}
.btn-primary:hover{background:var(--purple);border-color:var(--purple3);color:#fff}
.btn-success{background:rgba(16,185,129,.2);border-color:var(--green);color:var(--green)}
.btn-danger{background:rgba(239,68,68,.15);border-color:var(--red);color:var(--red)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-lg{padding:10px 20px;font-size:13px}

/* ── Cards ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.card-title{font-weight:700;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;margin-bottom:12px}
.card-subtitle{font-size:11px;color:var(--text3);margin-top:2px}

/* ── Stat Cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:border-color .12s}
.stat-card:hover{border-color:var(--purple3)}
.stat-n{font-size:26px;font-weight:800}
.stat-l{font-size:11px;color:var(--text3);margin-top:3px}
.stat-purple .stat-n{color:var(--purple3)}
.stat-green .stat-n{color:var(--green)}
.stat-blue .stat-n{color:var(--blue)}
.stat-orange .stat-n{color:var(--orange)}
.stat-red .stat-n{color:var(--red)}
.stat-cyan .stat-n{color:var(--cyan)}

/* ── Tables ── */
.table-wrap{overflow-x:auto;border-radius:8px}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:11px;font-weight:700;color:var(--text3);background:var(--bg3);border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(124,58,237,.04)}
.empty-row{text-align:center;padding:30px;color:var(--text3)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.badge-purple{background:rgba(124,58,237,.2);color:var(--purple3)}
.badge-green{background:rgba(16,185,129,.2);color:var(--green)}
.badge-red{background:rgba(239,68,68,.2);color:var(--red)}
.badge-orange{background:rgba(245,158,11,.2);color:var(--orange)}
.badge-blue{background:rgba(59,130,246,.2);color:var(--blue)}
.badge-grey{background:var(--bg3);color:var(--text3)}
.badge-cyan{background:rgba(6,182,212,.2);color:var(--cyan)}

/* ── Forms ── */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.form-input{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px;transition:border-color .12s}
.form-input:focus{outline:none;border-color:var(--purple)}
.form-select{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text);font-size:12px}
textarea.form-input{resize:vertical;min-height:70px;font-family:monospace}

/* ── Progress ── */
.progress-wrap{background:var(--bg3);border-radius:6px;height:8px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--purple),var(--blue));transition:width .4s ease}
.progress-fill.green{background:linear-gradient(90deg,var(--green),var(--cyan))}
.progress-fill.red{background:linear-gradient(90deg,var(--red),var(--orange))}

/* ── Tabs ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:8px 14px;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;font-size:12px;font-weight:600;transition:all .12s;white-space:nowrap}
.tab:hover{color:var(--text)}
.tab.active{color:var(--purple3);border-bottom-color:var(--purple)}

/* ── Alert / Toast ── */
.alert{padding:10px 14px;border-radius:8px;font-size:12px;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.alert-info{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--blue)}
.alert-success{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green)}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--orange)}
.alert-danger{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.toast-container{position:fixed;top:16px;right:16px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;font-size:12px;box-shadow:0 8px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;min-width:260px;animation:slideIn .2s ease}
@keyframes slideIn{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Hex viewer ── */
.hex-row{display:flex;gap:16px;padding:3px 0;font-size:11px;font-family:monospace}
.hex-offset{color:var(--purple3);width:70px;flex-shrink:0}
.hex-bytes{color:var(--green);flex:1;letter-spacing:.5px}
.hex-ascii{color:var(--text2);width:120px;flex-shrink:0}

/* ── Process tree ── */
.proc-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:background .1s}
.proc-row:hover{background:var(--bg3)}
.proc-row.suspicious{background:rgba(239,68,68,.08);border-left:3px solid var(--red)}
.proc-indent{border-left:2px solid var(--border2);margin-left:12px;padding-left:4px}

/* ── Drop zone ── */
.dropzone{border:2px dashed var(--border2);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:all .15s;color:var(--text3)}
.dropzone:hover,.dropzone.drag-over{border-color:var(--purple);background:rgba(124,58,237,.05);color:var(--purple3)}
.dropzone-icon{font-size:36px;margin-bottom:10px}

/* ── Misc ── */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.flex{display:flex;align-items:center;gap:8px}
.flex-between{display:flex;align-items:center;justify-content:space-between}
.flex-wrap{display:flex;flex-wrap:wrap;gap:8px}
.mt{margin-top:12px}
.text-muted{color:var(--text3)}
.text-sm{font-size:11px}
.text-xs{font-size:10px}
.text-mono{font-family:monospace}
.text-purple{color:var(--purple3)}
.text-green{color:var(--green)}
.text-red{color:var(--red)}
.text-orange{color:var(--orange)}
.text-blue{color:var(--blue)}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.spin{display:inline-block;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader{text-align:center;padding:32px;color:var(--text3)}
.tag{display:inline-block;background:rgba(124,58,237,.15);color:var(--purple3);padding:1px 7px;border-radius:10px;font-size:10px;font-weight:600}
.hash-display{font-family:monospace;font-size:10px;background:var(--bg3);padding:6px 10px;border-radius:6px;word-break:break-all;color:var(--green);margin:4px 0}
code{background:var(--bg3);padding:2px 6px;border-radius:4px;font-size:11px;font-family:monospace;color:var(--cyan)}
.panel-header{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px}
.info-row:last-child{border-bottom:none}
.info-key{color:var(--text3)}
.info-val{color:var(--text);font-weight:500;font-family:monospace;font-size:11px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {useState,useEffect,useRef,useCallback,useReducer}=React;
const API='http://localhost:8000';

async function api(path,opts={}){
  const headers={'Content-Type':'application/json',...(opts.headers||{})};
  const res=await fetch(API+path,{...opts,headers});
  if(!res.ok){const e=await res.json().catch(()=>({detail:'Error'}));throw new Error(e.detail||'Request failed');}
  if(res.status===204)return null;
  return res.json();
}
async function apiForm(path,formData){
  const res=await fetch(API+path,{method:'POST',body:formData});
  if(!res.ok){const e=await res.json().catch(()=>({detail:'Upload failed'}));throw new Error(e.detail||'Upload failed');}
  return res.json();
}

// ── Toast system ────────────────────────────────────────────────────
let _toastId=0;
let _setToasts=null;
function toast(msg,type='info'){
  if(_setToasts){
    const id=++_toastId;
    _setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>_setToasts(t=>t.filter(x=>x.id!==id)),4000);
  }
}
const TOAST_ICONS={info:'ℹ️',success:'✅',warn:'⚠️',error:'❌'};
function ToastContainer(){
  const [toasts,setToasts]=useState([]);
  _setToasts=setToasts;
  return React.createElement('div',{className:'toast-container'},
    toasts.map(t=>React.createElement('div',{key:t.id,className:'toast'},
      TOAST_ICONS[t.type]||'ℹ️',
      React.createElement('span',null,t.msg)
    ))
  );
}

// ── Reusable components ─────────────────────────────────────────────
function Badge({label,type='grey'}){
  return React.createElement('span',{className:`badge badge-${type}`},label);
}
function Loader({msg='Loading...'}){
  return React.createElement('div',{className:'loader'},
    React.createElement('span',{className:'spin'},'⟳'),' ',msg
  );
}
function ProgressBar({pct,color=''}){
  return React.createElement('div',{className:'progress-wrap'},
    React.createElement('div',{className:`progress-fill ${color}`,style:{width:`${Math.min(100,pct||0)}%`}})
  );
}
function InfoRow({k,v}){
  return React.createElement('div',{className:'info-row'},
    React.createElement('span',{className:'info-key'},k),
    React.createElement('span',{className:'info-val'},v)
  );
}
function Section({title,icon,children,action=null}){
  return React.createElement('div',{className:'card'},
    React.createElement('div',{className:'flex-between',style:{marginBottom:12}},
      React.createElement('div',{className:'card-title',style:{margin:0}},icon&&React.createElement('span',null,icon),' ',title),
      action
    ),
    children
  );
}
function EmptyState({icon,msg}){
  return React.createElement('div',{style:{textAlign:'center',padding:30,color:'var(--text3)'}},
    React.createElement('div',{style:{fontSize:32,marginBottom:8}},icon),
    React.createElement('div',null,msg)
  );
}

// ── Poll helper ─────────────────────────────────────────────────────
function usePoll(url,interval=1500,active=true){
  const [data,setData]=useState(null);
  useEffect(()=>{
    if(!url||!active)return;
    let alive=true;
    const tick=()=>api(url).then(d=>{if(alive)setData(d);}).catch(()=>{});
    tick();
    const id=setInterval(tick,interval);
    return()=>{alive=false;clearInterval(id);};
  },[url,active]);
  return data;
}

// ══════════════════════════════════════════════════════════════════
// DASHBOARD
// ══════════════════════════════════════════════════════════════════
function Dashboard({setPage}){
  const [data,setData]=useState(null);
  const [sysInfo,setSysInfo]=useState(null);
  useEffect(()=>{
    api('/api/system/dashboard').then(setData).catch(()=>{});
    api('/api/system/info').then(setSysInfo).catch(()=>{});
  },[]);
  return React.createElement('div',null,
    React.createElement('div',{className:'flex-between',style:{marginBottom:20}},
      React.createElement('div',null,
        React.createElement('h2',{style:{fontSize:20,fontWeight:800,color:'var(--text)'}},'Forensic Workstation'),
        React.createElement('p',{className:'text-muted text-sm'},data?.platform||'Detecting system...')
      ),
      React.createElement('div',{className:'flex'},
        React.createElement('span',{className:'badge badge-green'},'● ONLINE'),
        React.createElement('span',{className:'badge badge-purple'},'ForenCore v1.0')
      )
    ),
    sysInfo&&React.createElement('div',{className:'stat-grid'},
      React.createElement('div',{className:'stat-card stat-purple'},
        React.createElement('div',{className:'stat-n'},`${sysInfo.ram_total_gb||'?'}`),
        React.createElement('div',{className:'stat-l'},'💾 RAM (GB)')
      ),
      React.createElement('div',{className:'stat-card stat-green'},
        React.createElement('div',{className:'stat-n'},data?.capture_count||0),
        React.createElement('div',{className:'stat-l'},'🧠 RAM Captures')
      ),
      React.createElement('div',{className:'stat-card stat-blue'},
        React.createElement('div',{className:'stat-n'},data?.image_count||0),
        React.createElement('div',{className:'stat-l'},'💿 Disk Images')
      ),
      React.createElement('div',{className:'stat-card stat-orange'},
        React.createElement('div',{className:'stat-n'},data?.report_count||0),
        React.createElement('div',{className:'stat-l'},'📄 Reports')
      )
    ),
    React.createElement('div',{className:'grid2'},
      React.createElement(Section,{title:'System Information',icon:'🖥'},
        sysInfo?React.createElement('div',null,
          React.createElement(InfoRow,{k:'Hostname',v:sysInfo.hostname}),
          React.createElement(InfoRow,{k:'OS',v:`${sysInfo.os} ${sysInfo.os_release}`}),
          React.createElement(InfoRow,{k:'Architecture',v:sysInfo.architecture}),
          React.createElement(InfoRow,{k:'RAM Total',v:`${sysInfo.ram_total_gb} GB`}),
          React.createElement(InfoRow,{k:'RAM Used',v:`${sysInfo.ram_percent}%`}),
          React.createElement('div',{className:'mt'},
            React.createElement('div',{className:'text-sm text-muted',style:{marginBottom:4}},'Memory Usage'),
            React.createElement(ProgressBar,{pct:sysInfo.ram_percent,color:sysInfo.ram_percent>80?'red':''})
          )
        ):React.createElement(Loader)
      ),
      React.createElement(Section,{title:'Quick Actions',icon:'⚡'},
        React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8}},
          [
            {icon:'🧠',label:'Capture RAM',page:'ram-capture',color:'btn-primary'},
            {icon:'💿',label:'Create Disk Image',page:'disk-imaging',color:''},
            {icon:'🔍',label:'Analyze Memory Dump',page:'ram-analysis',color:''},
            {icon:'🗂',label:'Recover Deleted Files',page:'data-recovery',color:''},
            {icon:'📄',label:'Generate Report',page:'reports',color:''},
          ].map(a=>React.createElement('button',{
            key:a.page,className:`btn ${a.color}`,style:{justifyContent:'flex-start'},
            onClick:()=>setPage(a.page)
          },a.icon,' ',a.label))
        )
      )
    ),
    React.createElement(Section,{title:'Recent Evidence Files',icon:'📁'},
      !data?React.createElement(Loader):
      data.captures.length===0&&data.images.length===0
        ?React.createElement(EmptyState,{icon:'📭',msg:'No evidence files yet. Start by capturing RAM or creating a disk image.'})
        :React.createElement('div',{className:'table-wrap'},
          React.createElement('table',null,
            React.createElement('thead',null,React.createElement('tr',null,
              ['Name','Type','Size','Modified'].map(h=>React.createElement('th',{key:h},h))
            )),
            React.createElement('tbody',null,
              [...data.captures,...data.images].slice(0,10).map((f,i)=>
                React.createElement('tr',{key:i},
                  React.createElement('td',null,React.createElement('span',{className:'text-mono text-sm'},f.name)),
                  React.createElement('td',null,React.createElement(Badge,{label:f.format||'raw',type:'purple'})),
                  React.createElement('td',null,`${f.size_gb} GB`),
                  React.createElement('td',null,React.createElement('span',{className:'text-muted text-sm'},f.modified?.substring(0,16)||''))
                )
              )
            )
          )
        )
    )
  );
}

// ══════════════════════════════════════════════════════════════════
// RAM CAPTURE
// ══════════════════════════════════════════════════════════════════
function RamCapture(){
  const [sysInfo,setSysInfo]=useState(null);
  const [taskId,setTaskId]=useState(null);
  const [fmt,setFmt]=useState('raw');
  const [outName,setOutName]=useState('');
  const [captures,setCaptures]=useState([]);
  const poll=usePoll(taskId?`/api/ram/capture/progress/${taskId}`:null,1200,!!taskId);

  useEffect(()=>{
    api('/api/ram/capture/sysinfo').then(setSysInfo).catch(()=>{});
    api('/api/ram/capture/list').then(setCaptures).catch(()=>{});
  },[]);
  useEffect(()=>{
    if(poll?.status==='completed'){
      toast('✅ RAM capture complete!','success');
      api('/api/ram/capture/list').then(setCaptures).catch(()=>{});
    }
    if(poll?.status==='failed') toast('❌ Capture failed: '+poll.message,'error');
  },[poll?.status]);

  async function startCapture(){
    try{
      const r=await api('/api/ram/capture/start',{method:'POST',body:JSON.stringify({fmt,output_name:outName||undefined})});
      setTaskId(r.task_id);
      toast('🧠 RAM capture started','info');
    }catch(e){toast('❌ '+e.message,'error');}
  }

  const running=poll&&['starting','running','hashing'].includes(poll.status);

  return React.createElement('div',null,
    React.createElement('div',{className:'flex-between',style:{marginBottom:20}},
      React.createElement('div',null,
        React.createElement('h2',{style:{fontSize:18,fontWeight:800}},'🧠 RAM Capture'),
        React.createElement('p',{className:'text-muted text-sm'},'Live memory acquisition — WinPMEM / /proc/kcore')
      )

function Utilities(){
  const [tab,setTab]=useState('hash');
  const [filePath,setFilePath]=useState('');
  const [result,setResult]=useState(null);
  const [hexOffset,setHexOffset]=useState(0);
  const [loading,setLoading]=useState(false);

  async function run(){
    if(!filePath.trim()){toast('Enter file path','warn');return;}
    setLoading(true);setResult(null);
    try{
      let r;
      if(tab==='hash') r=await api('/api/utils/hash',{method:'POST',body:JSON.stringify({file_path:filePath})});
      else if(tab==='hex') r=await api('/api/utils/hex',{method:'POST',body:JSON.stringify({file_path:filePath,offset:hexOffset,length:512})});
      else if(tab==='strings') r=await api('/api/utils/strings',{method:'POST',body:JSON.stringify({file_path:filePath})});
      else if(tab==='entropy') r=await api('/api/utils/entropy',{method:'POST',body:JSON.stringify({file_path:filePath})});
      setResult(r);
    }catch(e){toast('❌ '+e.message,'error');}
    setLoading(false);
  }

  return React.createElement('div',null,
    React.createElement('h2',{style:{fontSize:18,fontWeight:800,marginBottom:20}},'🔧 Forensic Utilities'),
    React.createElement('div',{className:'tabs'},
      ['hash','hex','strings','entropy'].map(t=>React.createElement('div',{key:t,
        className:`tab${tab===t?' active':''}`,onClick:()=>{setTab(t);setResult(null);}},
        {hash:'🔐 Hash Calculator',hex:'🔢 Hex Viewer',strings:'📝 Strings Extractor',entropy:'📊 Entropy Analyzer'}[t]
      ))
    ),
    React.createElement('div',{className:'card'},
      React.createElement('div',{className:'flex',style:{gap:8,marginBottom:12}},
        React.createElement('input',{className:'form-input',style:{flex:1},value:filePath,onChange:e=>setFilePath(e.target.value),
          placeholder:'Enter file path...'}),
        tab==='hex'&&React.createElement('input',{className:'form-input',style:{width:120},value:hexOffset,
          onChange:e=>setHexOffset(parseInt(e.target.value)||0),type:'number',placeholder:'Offset'}),
        React.createElement('button',{className:'btn btn-primary',onClick:run,disabled:loading},
          loading?[React.createElement('span',{key:'s',className:'spin'},'⟳'),' ']:'▶ Run'
        )
      ),

      result&&tab==='hash'&&React.createElement('div',null,
        React.createElement(InfoRow,{k:'File Size',v:result.size_bytes?.toLocaleString()+' bytes'}),
        React.createElement('div',{style:{marginTop:10}},
          ['md5','sha1','sha256'].map(h=>React.createElement('div',{key:h,style:{marginBottom:8}},
            React.createElement('div',{className:'flex',style:{marginBottom:4}},
              React.createElement(Badge,{label:h.toUpperCase(),type:'purple'}),
              React.createElement('span',{className:'text-xs text-muted'},h==='md5'?'128-bit':h==='sha1'?'160-bit':'256-bit')

        result.lines?.map((l,i)=>React.createElement('div',{key:i,className:'hex-row'},

const NAV=[
  {section:'Forensics'},
  {id:'dashboard',icon:'📊',label:'Dashboard'},
  {section:'Acquisition'},
  {id:'ram-capture',icon:'🧠',label:'RAM Capture'},
  {id:'disk-imaging',icon:'💿',label:'Disk Imaging'},
  {section:'Analysis'},
  {id:'ram-analysis',icon:'🔍',label:'RAM Analysis'},
  {id:'disk-analysis',icon:'🗂',label:'Disk Analysis'},
  {section:'Recovery'},
  {id:'data-recovery',icon:'🗑',label:'Data Recovery'},
  {id:'partition-recovery',icon:'📦',label:'Partition Recovery'},
  {section:'Tools'},
  {id:'utilities',icon:'🔧',label:'Utilities'},
  {id:'reports',icon:'📄',label:'Reports'},
];
const PAGE_TITLES={
  dashboard:'Dashboard','ram-capture':'RAM Capture','disk-imaging':'Disk Imaging',
  'ram-analysis':'RAM Analysis','disk-analysis':'Disk Analysis',
  'data-recovery':'Data Recovery','partition-recovery':'Partition Recovery',
  'utilities':'Forensic Utilities','reports':'Reports'
};

function App(){
  const [page,setPage]=useState('dashboard');
  const [sysRam,setSysRam]=useState(null);

  useEffect(()=>{
    api('/api/system/info').then(d=>setSysRam(d?.ram_percent||0)).catch(()=>{});
  },[]);

  function renderPage(){
    switch(page){
      case 'dashboard':           return React.createElement(Dashboard,{setPage});
      case 'ram-capture':         return React.createElement(RamCapture);
      case 'ram-analysis':        return React.createElement(RamAnalysis);
      case 'disk-imaging':        return React.createElement(DiskImaging);
      case 'disk-analysis':       return React.createElement(DiskAnalysis);
      case 'data-recovery':       return React.createElement(DataRecovery);
      case 'partition-recovery':  return React.createElement(PartitionRecovery);
      case 'utilities':           return React.createElement(Utilities);
      case 'reports':             return React.createElement(Reports);
      default: return React.createElement(Dashboard,{setPage});
    }
  }

  return React.createElement('div',{style:{display:'flex',height:'100vh',width:'100%'}},
    React.createElement(ToastContainer),
    // ── Sidebar ─────────────────────────────────────────
    React.createElement('div',{className:'sidebar'},
      React.createElement('div',{className:'sidebar-logo'},
        React.createElement('div',{className:'logo-icon'},'🔬'),
        React.createElement('div',null,
          React.createElement('div',{className:'logo-name'},'ForenCore'),
          React.createElement('div',{className:'logo-ver'},'v1.0 • Forensic Workstation')
        )
      ),
      React.createElement('nav',{style:{flex:1,overflowY:'auto'}},
        NAV.map((n,i)=>
          n.section
            ?React.createElement('div',{key:i,className:'nav-section-label',style:{marginTop:i>0?8:0}},n.section)
            :React.createElement('div',{key:n.id,
                className:`nav-item${page===n.id?' active':''}`,
                onClick:()=>setPage(n.id)},
              React.createElement('span',{className:'nav-icon'},n.icon),
              n.label,
              n.id==='ram-capture'&&React.createElement('span',{key:'d',className:'nav-dot'})
            )
        )
      ),
      React.createElement('div',{className:'sidebar-footer'},
        React.createElement('div',{className:'flex-between',style:{marginBottom:4}},
          React.createElement('span',{className:'text-xs text-muted'},'RAM Usage'),
          React.createElement('span',{className:'text-xs text-purple'},`${sysRam||0}%`)
        ),
        React.createElement('div',{className:'sys-bar'},
          React.createElement('div',{className:'sys-fill',style:{width:`${sysRam||0}%`}})
        ),
        React.createElement('div',{className:'flex',style:{marginTop:8,gap:6}},
          React.createElement('span',{className:'badge badge-green',style:{fontSize:9}},'● ONLINE'),
          React.createElement('span',{className:'badge badge-grey',style:{fontSize:9}},'Offline Mode')
        )
      )
    ),
    // ── Main area ────────────────────────────────────────
    React.createElement('div',{className:'main'},
      React.createElement('div',{className:'topbar'},
        React.createElement('div',{className:'topbar-icon'}, NAV.find(n=>n.id===page)?.icon||'🔬'),
        React.createElement('div',{className:'topbar-title'},PAGE_TITLES[page]||page),
        React.createElement('div',{className:'flex',style:{gap:8}},
          React.createElement('span',{className:'badge badge-purple'},'ForenCore v1.0'),
          React.createElement('span',{className:'badge badge-green'},'🔒 Offline')
        )
      ),
      React.createElement('div',{className:'page-content'},renderPage())
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
